name: Slack Screenshot Bot

on:
  schedule:
     - cron: '10 7-16 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [manual_slack_capture]

jobs:
  capture-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 불러오기
        uses: actions/checkout@v5

      - name: Python 환경 설정
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      # ⚡ [속도 패치 완료] apt-get update 과정을 제거하여 한글 폰트 주입 단계를 고속화했습니다.
      - name: 한글 시스템 폰트 사전 설치
        run: sudo apt-get install -y --no-install-recommends fonts-nanum

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: 파이썬 스크립트 실행
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: python main.py
